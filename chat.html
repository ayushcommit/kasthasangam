<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Astrologer | Kathasangam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
</head>
<body class="bg-[#0f041a] text-white h-screen flex flex-col overflow-hidden">

    <!-- Chat Header -->
    <header class="glass-nav px-4 py-3 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <a href="talk-to-astrologer.html" class="p-2 hover:bg-white/5 rounded-full"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="relative">
                <div class="w-10 h-10 rounded-full bg-katha-saffron p-0.5">
                    <img id="header-astro-pic" src="" alt="" class="w-full h-full rounded-full object-cover">
                </div>
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#1a0430] rounded-full"></span>
            </div>
            <div>
                <h2 id="header-astro-name" class="font-bold text-sm leading-none mb-1">Astrologer Name</h2>
                <p class="text-[10px] text-green-400 font-medium uppercase tracking-wider">Online</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="bg-katha-saffron/10 border border-katha-saffron/20 px-3 py-1.5 rounded-full flex items-center gap-2">
                <i class="fa-solid fa-clock text-katha-saffron text-xs"></i>
                <span id="session-timer" class="font-bold text-sm text-katha-saffron">00:00</span>
            </div>
            <div class="hidden md:flex flex-col items-end">
                <span class="text-[10px] text-gray-500 uppercase">Wallet</span>
                <span id="chat-wallet-balance" class="font-bold text-xs text-katha-gold">₹0.00</span>
            </div>
            <button onclick="endSession()" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 px-4 py-2 rounded-full text-xs font-bold border border-red-500/20 transition-all">End</button>
        </div>
    </header>

    <!-- Chat Messages -->
    <main id="chat-messages" class="flex-grow overflow-y-auto p-4 space-y-4 custom-scrollbar bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
        <!-- Messages will be rendered here -->
         <div class="flex justify-center py-4">
             <span class="bg-white/5 border border-white/10 px-4 py-1 rounded-full text-[10px] text-gray-400 uppercase tracking-widest">Session Started</span>
         </div>
    </main>

    <!-- Chat Input -->
    <footer class="p-4 bg-[#1a0430] border-t border-white/10">
        <div class="max-w-4xl mx-auto flex items-center gap-3">
            <button class="p-3 text-gray-500 hover:text-katha-saffron"><i class="fa-solid fa-plus"></i></button>
            <div class="flex-grow relative">
                <input id="chat-input" type="text" placeholder="Type your question..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-3.5 px-6 pr-12 text-sm focus:outline-none focus:border-katha-saffron/50 transition-all">
                <button id="send-btn" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-xl bg-katha-saffron text-white flex items-center justify-center hover:shadow-lg transition-all">
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </footer>

    <!-- End Session Modal -->
    <div id="end-session-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="glass-dark max-w-sm w-full rounded-3xl p-8 text-center border border-white/10">
            <div class="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-phone-slash text-2xl text-red-500"></i>
            </div>
            <h3 class="text-xl font-bold mb-2 font-serif">End Consultation?</h3>
            <p class="text-gray-400 text-sm mb-8">Are you sure you want to end the session? You will be billed for the duration.</p>
            <div class="flex gap-4">
                <button onclick="document.getElementById('end-session-modal').classList.add('hidden')" class="flex-1 py-3 rounded-xl border border-white/10 text-white font-bold text-sm">Cancel</button>
                <button onclick="confirmEndSession()" class="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold text-sm">Yes, End Session</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
