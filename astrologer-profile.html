<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrologer Profile | Kathasangam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
</head>
<body class="bg-katha-purple-dark text-white antialiased">

    <!-- Navigation -->
    <nav class="glass-nav py-4 px-6 flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="flex items-center gap-2">
            <i class="fa-solid fa-dharmachakra text-2xl text-katha-saffron"></i>
            <span class="font-serif text-xl font-bold gradient-text">Kathasangam</span>
        </a>
        <div id="auth-nav-container">
             <!-- Dynamic Auth State -->
        </div>
    </nav>

    <main id="profile-container" class="max-w-5xl mx-auto px-4 py-12">
        <!-- Loading State -->
        <div class="text-center py-20" id="loading">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-katha-saffron"></div>
        </div>

        <!-- Profile Content (Hidden by default) -->
        <div id="profile-content" class="hidden space-y-8">
            <div class="glass-dark rounded-[2.5rem] p-8 md:p-12 border border-white/10 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-katha-saffron/10 filter blur-[100px] -z-10"></div>
                
                <div class="flex flex-col md:flex-row gap-10 items-center md:items-start text-center md:text-left">
                    <div class="w-48 h-48 rounded-3xl bg-gradient-to-br from-katha-saffron to-katha-purple p-1 shadow-2xl">
                        <img id="profile-pic" src="" alt="" class="w-full h-full rounded-[1.4rem] object-cover border-4 border-katha-purple-dark">
                    </div>
                    
                    <div class="flex-grow">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                            <div>
                                <h1 id="profile-name" class="text-4xl font-serif font-bold"></h1>
                                <p id="profile-spec" class="text-katha-saffron font-bold text-lg mt-1"></p>
                            </div>
                            <div class="flex items-center gap-2 bg-green-500/20 text-green-400 px-4 py-2 rounded-2xl border border-green-500/30">
                                <span class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse"></span>
                                <span class="font-bold text-sm" id="profile-status">Available</span>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8 py-6 border-y border-white/5">
                            <div>
                                <p class="text-gray-500 text-xs uppercase tracking-widest mb-1">Experience</p>
                                <p id="profile-exp" class="font-bold text-lg">15+ Years</p>
                            </div>
                            <div>
                                <p class="text-gray-500 text-xs uppercase tracking-widest mb-1">Rating</p>
                                <p class="font-bold text-lg text-katha-gold"><i class="fa-solid fa-star mr-1"></i> <span id="profile-rating">4.9</span></p>
                            </div>
                            <div>
                                <p class="text-gray-500 text-xs uppercase tracking-widest mb-1">Consultations</p>
                                <p id="profile-orders" class="font-bold text-lg">12,400+</p>
                            </div>
                            <div>
                                <p class="text-gray-500 text-xs uppercase tracking-widest mb-1">Price</p>
                                <p class="font-bold text-lg text-katha-saffron">₹<span id="profile-price">20</span>/min</p>
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4">
                            <button id="chat-btn" class="flex-grow py-4 rounded-2xl bg-gradient-to-r from-katha-saffron to-katha-saffron-dark text-white font-bold text-lg shadow-xl hover:shadow-katha-saffron/20 transition-all transform hover:-translate-y-1 flex items-center justify-center gap-3">
                                <i class="fa-solid fa-comment-dots text-xl"></i> Chat Now
                            </button>
                            <button id="call-btn" class="sm:px-8 py-4 rounded-2xl glass-effect text-white font-bold text-lg hover:bg-white/10 transition-all flex items-center justify-center gap-3 border border-white/10">
                                <i class="fa-solid fa-phone-volume"></i> Call
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- About & Specialties -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <div class="glass-dark rounded-3xl p-8 border border-white/10">
                        <h2 class="text-2xl font-serif font-bold mb-6">About Me</h2>
                        <p id="profile-bio" class="text-gray-300 leading-relaxed text-lg font-light"></p>
                    </div>
                    
                    <div class="glass-dark rounded-3xl p-8 border border-white/10">
                        <h2 class="text-2xl font-serif font-bold mb-6">User Reviews</h2>
                        <div id="reviews-container" class="space-y-6">
                            <!-- Reviews will be rendered here -->
                             <p class="text-gray-500 italic text-center py-10">No reviews yet. Be the first to consult!</p>
                        </div>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="glass-dark rounded-3xl p-8 border border-white/10">
                        <h3 class="font-bold text-xl mb-6">Languages</h3>
                        <div id="profile-langs" class="flex flex-wrap gap-2"></div>
                    </div>
                    
                    <div class="glass-dark rounded-3xl p-8 border border-white/10">
                        <h3 class="font-bold text-xl mb-6">Specializations</h3>
                        <div id="profile-specs" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const astrologerId = params.get('id');
            
            if (!astrologerId) {
                window.location.href = 'talk-to-astrologer.html';
                return;
            }

            if (!window.db) {
                console.error("Firestore not initialized");
                return;
            }

            try {
                const doc = await window.db.collection('astrologers').doc(astrologerId).get();
                if (!doc.exists) {
                    alert("Astrologer not found");
                    window.location.href = 'talk-to-astrologer.html';
                    return;
                }

                const data = doc.data();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('profile-content').classList.remove('hidden');

                document.getElementById('profile-name').textContent = data.name;
                document.getElementById('profile-spec').textContent = data.specialization;
                document.getElementById('profile-pic').src = data.profilePic || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(data.name);
                document.getElementById('profile-exp').textContent = `${data.experience || 10} Yrs`;
                document.getElementById('profile-rating').textContent = data.rating || '5.0';
                document.getElementById('profile-price').textContent = data.pricePerMin || 20;
                document.getElementById('profile-bio').textContent = data.bio || 'Experienced astrologer helping individuals find their path through Vedic and spiritual guidance.';
                document.getElementById('profile-status').textContent = data.status || 'Offline';

                // Render Languages
                const langContainer = document.getElementById('profile-langs');
                (data.languages || ['Hindi', 'English']).forEach(lang => {
                    const span = document.createElement('span');
                    span.className = 'px-4 py-1.5 glass-effect rounded-full text-sm text-gray-300';
                    span.textContent = lang;
                    langContainer.appendChild(span);
                });

                // Render Specs
                const specContainer = document.getElementById('profile-specs');
                (data.expertise || [data.specialization]).forEach(spec => {
                    const span = document.createElement('span');
                    span.className = 'px-4 py-1.5 glass-effect rounded-full text-sm text-katha-saffron border border-katha-saffron/20';
                    span.textContent = spec;
                    specContainer.appendChild(span);
                });

                document.getElementById('chat-btn').onclick = () => {
                    if (window.startChat) window.startChat(astrologerId);
                };

            } catch (error) {
                console.error("Error loading profile:", error);
            }
        });
    </script>
</body>
</html>
